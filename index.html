<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="LOGO.PNG" type="image/png">
  <title>Shikhar Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <section class="hero">
      <h1 id="hero-title"></h1>
      <p id="hero-subtitle"></p>
    </section>

    <section class="about">
      <h2>About Us</h2>
      <p id="about-text"></p>
    </section>

    <section class="news">
      <h2>Recent News</h2>
      <ul id="news-list"></ul>
    </section>

    <section class="contact">
      <h2>Contact</h2>
      <p>Email: <span id="contact-email"></span></p>
      <p>Address: <span id="contact-address"></span></p>
    </section>

    <section class="links">
      <h2>Links</h2>
      <ul class="links-list" id="links-list"></ul>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script src="js/common.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
